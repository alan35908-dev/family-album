<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端溫馨相簿</title>
    <style>
        :root {
            --bg-color: #FDF8F5;
            --text-main: #5C4D47;
            --text-muted: #8A7B76;
            --accent-color: #E8A598;
            --accent-hover: #D78F81;
            --card-bg: #FFFFFF;
            --shadow: 0 8px 24px rgba(200, 160, 150, 0.15);
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; color: var(--text-main); margin-bottom: 10px; letter-spacing: 2px; }
        p.subtitle { color: var(--text-muted); font-size: 1.1rem; }

        /* 上傳區塊 */
        .upload-section {
            background-color: var(--card-bg);
            border: 2px dashed var(--accent-color);
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
            box-shadow: var(--shadow);
            position: relative;
        }
        .upload-section:hover { background-color: rgba(232, 165, 152, 0.05); }
        .upload-section.loading { opacity: 0.5; cursor: wait; }
        #file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        /* 相簿網格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .photo-card {
            background-color: var(--card-bg);
            padding: 12px 12px 20px 12px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
            position: relative;
            cursor: zoom-in;
            animation: fadeIn 0.5s ease-out;
        }
        .photo-card:hover { transform: translateY(-8px) rotate(-1deg); }
        .photo-card img { width: 100%; height: 260px; border-radius: 4px; background-color: #f0f0f0; object-fit: cover; display: block; }
        .photo-date { margin-top: 12px; font-size: 0.85rem; color: var(--text-muted); text-align: center; }

        .delete-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9); color: #ff6b6b;
            border: none; border-radius: 50%; width: 32px; height: 32px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .photo-card:hover .delete-btn { opacity: 1; }

        /* 輪播燈箱 */
        .lightbox {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 30, 25, 0.95); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox-img { max-width: 90%; max-height: 80vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); object-fit: contain; }
        .lightbox-info { color: #fff; margin-top: 15px; font-size: 1.1rem; }
        .close-lb { position: absolute; top: 25px; right: 35px; color: #fff; font-size: 40px; cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: none; color: white; border: none; font-size: 50px; cursor: pointer; padding: 20px; transition: color 0.3s; }
        .nav-btn:hover { color: var(--accent-color); }
        .prev-btn { left: 10px; } .next-btn { right: 10px; }

        #error-msg { color: #ff6b6b; text-align: center; margin-bottom: 20px; display: none; padding: 10px; border: 1px solid #ff6b6b; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>我的雲端溫馨相簿</h1>
        <p class="subtitle">珍藏每一個美好瞬間 · 跨裝置同步中</p>
    </header>

    <div id="error-msg"></div>

    <div class="upload-section" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" multiple>
        <div id="status-text">
            <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">點擊或拖曳圖片至此上傳</p>
            <p style="font-size: 0.9rem; color: var(--text-muted);">圖片將自動同步至雲端（手機也看得到！）</p>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>
</div>

<div id="lightbox" class="lightbox">
    <span class="close-lb" id="close-lb">&times;</span>
    <button class="nav-btn prev-btn" id="prev-btn">&#10094;</button>
    <img class="lightbox-img" id="lightbox-img" src="">
    <div class="lightbox-info" id="lightbox-info"></div>
    <button class="nav-btn next-btn" id="next-btn">&#10095;</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyCQ2DyzBODSmf4jGfl5GfXW3FnPZ5MLN1A",
      authDomain: "family-album-4fd36.firebaseapp.com",
      projectId: "family-album-4fd36",
      storageBucket: "family-album-4fd36.firebasestorage.app",
      messagingSenderId: "1053043395989",
      appId: "1:1053043395989:web:29f9bd821a66c689fa9c",
      measurementId: "G-BF8QR3BV32"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const photosCol = collection(db, "photos");

    const galleryEl = document.getElementById('gallery');
    const fileInput = document.getElementById('file-input');
    const statusText = document.getElementById('status-text');
    const dropZone = document.getElementById('drop-zone');
    const errorMsgEl = document.getElementById('error-msg');

    let allPhotos = [];
    let currentIdx = 0;

    const formatDate = (ts) => {
        const d = new Date(ts);
        return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    };

    function showError(msg) {
        errorMsgEl.innerText = msg;
        errorMsgEl.style.display = 'block';
    }

    // 1. 實時同步雲端資料庫
    const q = query(photosCol, orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        allPhotos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        errorMsgEl.style.display = 'none';
        renderGallery();
    }, (error) => {
        console.error("Firestore 連線失敗:", error);
        if (error.code === 'permission-denied') {
            showError("權限不足：請至 Firebase 控制台確認 Firestore 是否已啟用並設定為「測試模式」。");
        } else {
            showError("無法連線至雲端服務，請檢查網路連線。");
        }
    });

    // 2. 處理檔案上傳
    fileInput.addEventListener('change', async (e) => {
        const files = e.target.files;
        if (!files.length) return;

        statusText.innerHTML = "正在上傳至雲端伺服器...";
        dropZone.classList.add('loading');

        for (const file of files) {
            const fileName = `${Date.now()}-${file.name}`;
            const storageRef = ref(storage, `uploads/${fileName}`);
            
            try {
                const snapshot = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snapshot.ref);
                
                await addDoc(photosCol, {
                    url: url,
                    storagePath: `uploads/${fileName}`,
                    timestamp: Date.now()
                });
            } catch (err) {
                console.error("上傳失敗:", err);
                alert("上傳失敗！請確認 Firebase 控制台中的 Storage 服務已啟用。");
            }
        }

        statusText.innerHTML = '<p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">點擊或拖曳圖片至此上傳</p><p style="font-size: 0.9rem; color: var(--text-muted);">圖片將自動同步至雲端（手機也看得到！）</p>';
        dropZone.classList.remove('loading');
        fileInput.value = '';
    });

    function renderGallery() {
        galleryEl.innerHTML = allPhotos.length ? '' : '<p style="grid-column:1/-1;text-align:center;padding:50px;color:#aaa;">雲端目前沒有照片。從這台裝置上傳，所有裝置都會同步看到！</p>';
        
        allPhotos.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <img src="${p.url}" loading="lazy" alt="相片">
                <div class="photo-date">${formatDate(p.timestamp)}</div>
                <button class="delete-btn" title="從雲端刪除">&times;</button>
            `;
            
            card.onclick = () => openLightbox(i);
            card.querySelector('.delete-btn').onclick = (e) => {
                e.stopPropagation();
                deletePhoto(p);
            };
            galleryEl.appendChild(card);
        });
    }

    async function deletePhoto(photo) {
        if (!confirm("確定要從雲端刪除嗎？所有人的裝置都將無法看到此照片。")) return;
        try {
            await deleteDoc(doc(db, "photos", photo.id));
            if (photo.storagePath) {
                await deleteObject(ref(storage, photo.storagePath));
            }
        } catch (err) {
            console.error("刪除失敗:", err);
        }
    }

    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbInfo = document.getElementById('lightbox-info');

    function openLightbox(index) {
        currentIdx = index;
        updateLightbox();
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function updateLightbox() {
        if (allPhotos[currentIdx]) {
            lbImg.src = allPhotos[currentIdx].url;
            lbInfo.innerText = formatDate(allPhotos[currentIdx].timestamp);
        }
    }

    document.getElementById('close-lb').onclick = () => {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto';
    };

    document.getElementById('next-btn').onclick = (e) => {
        e.stopPropagation();
        currentIdx = (currentIdx + 1) % allPhotos.length;
        updateLightbox();
    };

    document.getElementById('prev-btn').onclick = (e) => {
        e.stopPropagation();
        currentIdx = (currentIdx - 1 + allPhotos.length) % allPhotos.length;
        updateLightbox();
    };

    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowRight') document.getElementById('next-btn').click();
        if (e.key === 'ArrowLeft') document.getElementById('prev-btn').click();
        if (e.key === 'Escape') document.getElementById('close-lb').click();
    });
</script>

</body>
</html>
